    <!DOCTYPE html>
<html lang="en" dir="ltr">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: #E7F0F4;
    color: #2C3E50;
}

header {
    background-color: #2C3E50;
    padding: 15px 10%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo-nav img {
    height: 55px;
    filter: brightness(0) invert(1);
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-size: 0.9rem;
}

.login-btn-nav {
    background-color: white;
    color: #2C3E50;
    padding: 8px 22px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: bold;
}

.details-container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 30px;
}

.main-content h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

.location-info {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #666;
    margin-bottom: 25px;
}

.image-gallery {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 200px 200px;
    gap: 15px;
    margin-bottom: 30px;
}

.image-gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 15px;
    transition: 0.3s;
}

.image-gallery img:hover {
    filter: brightness(0.8);
}

.main-img {
    grid-row: span 2;
}

.features-grid {
    background: white;
    padding: 30px;
    border-radius: 20px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.feature-item {
    display: flex;
    align-items: center;
    gap: 15px;
}

.feature-item i {
    font-size: 1.5rem;
    color: #2C3E50;
}

.feature-item div span {
    display: block;
    font-size: 0.85rem;
    color: #888;
}

.feature-item div p {
    font-weight: bold;
    font-size: 1.1rem;
}

.booking-card {
    background: white;
    padding: 40px 30px;
    border-radius: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    height: fit-content;
    position: sticky;
    top: 40px;
    text-align: center;
}

.price-box {
    font-size: 2.2rem;
    font-weight: bold;
    margin-bottom: 25px;
    color: #2C3E50;
}

.price-box span {
    font-size: 1rem;
    color: #888;
    font-weight: normal;
}

.book-now-btn {
    background-color: #2C3E50;
    color: white;
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    text-decoration: none;
    display: block;
    font-weight: bold;
    font-size: 1.2rem;
    transition: 0.3s;
}

.book-now-btn:hover {
    background-color: #3e5a77;
    transform: translateY(-3px);
}

footer {
    background-color: #2C3E50;
    color: white;
    padding: 70px 10% 30px 10%;
    margin-top: 80px;
}

.footer-content {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 50px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
}

.footer-logo img {
    height: 70px;
    filter: brightness(0) invert(1);
}

.footer-info p {
    margin-bottom: 12px;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
}

.footer-info i {
    margin-right: 12px;
    width: 20px;
}

.social-links { margin-top: 25px; }
.social-links span { display: block; margin-bottom: 10px; font-weight: bold; }
.social-links a { color: white; margin-right: 20px; font-size: 1.4rem; }

.footer-bottom {
    text-align: center;
    padding-top: 30px;
}

.footer-nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-size: 0.85rem;
    letter-spacing: 1px;
}

@media (max-width: 900px) {
    .details-container { grid-template-columns: 1fr; }
    .booking-card { position: static; margin-top: 30px; }
    .image-gallery { grid-template-columns: 1fr; grid-template-rows: auto; }
    .main-img { grid-row: auto; height: 300px; }
    .footer-content { flex-direction: column; align-items: center; text-align: center; gap: 40px; }
    .footer-info p { justify-content: center; }
}
    </style>
